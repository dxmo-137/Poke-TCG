<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dxmo TCG Pocket</title>
    
    <!-- นำเข้า React และ ReactDOM แบบผ่านลิงก์ CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- นำเข้า Babel สำหรับแปลงโค้ด React (JSX) ให้ทำงานในเบราว์เซอร์ได้ตรงๆ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* ซ่อน Scrollbar ของหมวดหมู่แต่ยังเลื่อนได้ */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- โค้ดส่วนแอปพลิเคชันหลัก -->
    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- ไอคอนแบบ SVG (แทนที่ Lucide-react เพื่อให้ใช้ไฟล์เดียวได้) ---
        const SearchIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const PlusIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const XIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ImageIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
        const SparklesIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>;
        const TagIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42l-8.704-8.704z"></path><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"></circle></svg>;

        // --- ข้อมูลจำลอง (Mock Data) ---
        const initialCards = [
            { id: 1, name: 'Mewtwo ex', hp: 150, type: 'Psychic', rarity: '🌟🌟', price: 1500, image: '' },
            { id: 2, name: 'Charizard ex', hp: 180, type: 'Fire', rarity: '🌟', price: 1800, image: '' },
            { id: 3, name: 'Pikachu ex', hp: 120, type: 'Electric', rarity: '⭐⭐', price: 1200, image: '' },
            { id: 4, name: 'Misty (Special)', hp: null, type: 'Trainer', rarity: '⭐⭐', price: 800, image: '' },
            { id: 5, name: 'Poke Ball', hp: null, type: 'Item', rarity: '-', price: 50, image: '' },
            { id: 6, name: 'Dragonite', hp: 160, type: 'Dragon', rarity: '♦♦♦♦', price: 400, image: '' },
            { id: 7, name: 'Snorlax', hp: 150, type: 'Colorless', rarity: '♦♦♦', price: 200, image: '' },
            { id: 8, name: 'Bulbasaur', hp: 70, type: 'Grass', rarity: '♦', price: 50, image: '' },
        ];

        // --- สีพื้นหลังของการ์ดตามธาตุ ---
        const typeColors = {
            Grass: 'from-green-400 to-green-600',
            Fire: 'from-red-400 to-red-600',
            Water: 'from-blue-400 to-blue-600',
            Electric: 'from-yellow-300 to-yellow-500',
            Psychic: 'from-purple-400 to-purple-600',
            Fighting: 'from-orange-500 to-orange-700',
            Darkness: 'from-gray-700 to-gray-900',
            Metal: 'from-slate-400 to-slate-600',
            Dragon: 'from-amber-500 to-amber-700',
            Colorless: 'from-gray-200 to-gray-400',
            Item: 'from-cyan-400 to-blue-600',
            Trainer: 'from-pink-400 to-pink-600',
        };

        // --- ฟังก์ชันสร้างสไตล์ให้ระดับความหายาก ---
        const renderRarityBadge = (rarity) => {
            if (!rarity || rarity === '-') return null; 
            
            let textColor = 'text-white';
            let shadowClass = '';
            
            if (rarity.includes('♦')) {
                textColor = 'text-slate-300'; 
            } else if (rarity.includes('⭐')) {
                textColor = 'text-yellow-400'; 
                shadowClass = 'drop-shadow-[0_0_2px_rgba(250,204,21,0.8)]';
            } else if (rarity.includes('🌟')) {
                return (
                <div className="absolute bottom-4 right-4 bg-black/70 backdrop-blur-sm px-2 py-0.5 rounded-full font-bold text-[10px] sm:text-xs">
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-red-400 via-yellow-400 via-green-400 via-blue-400 to-purple-400 drop-shadow-[0_0_2px_rgba(255,255,255,0.5)]">
                    {rarity}
                    </span>
                </div>
                );
            }

            return (
                <div className={`absolute bottom-4 right-4 bg-black/70 backdrop-blur-sm ${textColor} ${shadowClass} text-[10px] sm:text-xs px-2 py-0.5 rounded-full font-bold`}>
                {rarity}
                </div>
            );
        };

        // --- App Component หลัก ---
        function App() {
            const [cards, setCards] = useState(initialCards);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedType, setSelectedType] = useState('All');
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);

            const [newCard, setNewCard] = useState({
                name: '', hp: '', type: 'Colorless', rarity: '♦', price: '', image: ''
            });

            const filteredCards = useMemo(() => {
                return cards.filter(card => {
                const matchesSearch = card.name.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesType = selectedType === 'All' || card.type === selectedType;
                return matchesSearch && matchesType;
                });
            }, [cards, searchQuery, selectedType]);

            const handleAddCard = (e) => {
                e.preventDefault();
                const cardToAdd = {
                ...newCard,
                id: Date.now(),
                hp: newCard.hp ? Number(newCard.hp) : null,
                price: Number(newCard.price),
                };
                setCards([cardToAdd, ...cards]);
                setIsAddModalOpen(false);
                setNewCard({ name: '', hp: '', type: 'Colorless', rarity: '♦', price: '', image: '' }); 
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800">
                
                {/* Header & Navbar */}
                <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
                    <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3">
                    <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-sm transform -rotate-6">
                        <span className="text-white font-black text-lg transform rotate-6">D</span>
                        </div>
                        <h1 className="text-xl font-black tracking-tight text-slate-900">
                        Dxmo <span className="text-sm font-semibold text-slate-400 ml-1">TCG Pocket</span>
                        </h1>
                    </div>

                    <div className="flex w-full sm:w-auto items-center gap-2">
                        <div className="relative flex-1 sm:w-64">
                        <SearchIcon className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
                        <input
                            type="text"
                            placeholder="ค้นหาการ์ด..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            className="w-full pl-9 pr-4 py-2 bg-slate-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-lg text-sm transition-all outline-none"
                        />
                        </div>
                        <button
                        onClick={() => setIsAddModalOpen(true)}
                        className="flex items-center gap-1.5 bg-slate-900 hover:bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap"
                        >
                        <PlusIcon className="w-4 h-4" />
                        <span className="hidden sm:inline">เพิ่มการ์ด</span>
                        </button>
                    </div>
                    </div>
                </header>

                <main className="max-w-7xl mx-auto px-4 py-6">
                    
                    {/* หมวดหมู่ธาตุ (Filters) */}
                    <div className="flex overflow-x-auto pb-4 mb-2 gap-2 scrollbar-hide">
                    <button
                        onClick={() => setSelectedType('All')}
                        className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${
                        selectedType === 'All' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-200 border border-slate-200'
                        }`}
                    >
                        ทั้งหมด
                    </button>
                    {Object.keys(typeColors).map(type => (
                        <button
                        key={type}
                        onClick={() => setSelectedType(type)}
                        className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors ${
                            selectedType === type ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-200 border border-slate-200'
                        }`}
                        >
                        {type}
                        </button>
                    ))}
                    </div>

                    {/* ตะแกรงแสดงการ์ด (Grid) */}
                    {filteredCards.length > 0 ? (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4 lg:gap-5">
                        {filteredCards.map(card => (
                        <div key={card.id} className="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow border border-slate-100 overflow-hidden group">
                            
                            <div className="relative aspect-[63/88] w-full bg-slate-100 overflow-hidden p-2 sm:p-3">
                            {card.image ? (
                                <img src={card.image} alt={card.name} className="w-full h-full object-cover rounded-lg shadow-sm" loading="lazy" />
                            ) : (
                                <div className={`w-full h-full rounded-lg shadow-sm bg-gradient-to-br ${typeColors[card.type] || 'from-gray-200 to-gray-300'} flex flex-col items-center justify-center text-white relative`}>
                                <span className="opacity-50 text-xs sm:text-sm font-medium tracking-widest uppercase">{card.type}</span>
                                <ImageIcon className="w-8 h-8 mt-2 opacity-30" />
                                </div>
                            )}
                            {renderRarityBadge(card.rarity)}
                            </div>

                            <div className="p-3">
                            <div className="flex justify-between items-start mb-1">
                                <h3 className="font-semibold text-slate-800 text-sm sm:text-base truncate pr-2" title={card.name}>{card.name}</h3>
                                {card.hp ? (
                                <span className="text-xs font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">HP {card.hp}</span>
                                ) : (
                                <span className="text-xs font-bold text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">{card.type}</span>
                                )}
                            </div>
                            
                            <div className="flex items-center justify-between mt-3">
                                <div className="flex items-center gap-1 text-slate-500">
                                <TagIcon className="w-3.5 h-3.5" />
                                <span className="text-xs font-medium">{card.type}</span>
                                </div>
                                <div className="font-bold text-blue-600 text-sm sm:text-base">
                                ฿{card.price.toLocaleString()}
                                </div>
                            </div>
                            </div>
                        </div>
                        ))}
                    </div>
                    ) : (
                    <div className="py-20 text-center flex flex-col items-center">
                        <SparklesIcon className="w-12 h-12 text-slate-300 mb-3" />
                        <h3 className="text-lg font-medium text-slate-600">ไม่พบการ์ดที่ค้นหา</h3>
                        <p className="text-slate-400 text-sm mt-1">ลองเปลี่ยนคำค้นหา หรือเลือกธาตุอื่นดูนะครับ</p>
                    </div>
                    )}
                </main>

                {/* Modal สำหรับเพิ่มการ์ดใหม่ */}
                {isAddModalOpen && (
                    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                        <h2 className="text-lg font-bold text-slate-800">เพิ่มการ์ดใหม่</h2>
                        <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 transition-colors">
                            <XIcon className="w-5 h-5" />
                        </button>
                        </div>
                        
                        <form onSubmit={handleAddCard} className="p-5 space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">ชื่อการ์ด (Pokemon Name)</label>
                            <input required type="text" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="เช่น Pikachu ex" />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">พลังชีวิต (HP - เว้นได้ถ้าเป็นไอเทม)</label>
                            <input type="number" value={newCard.hp} onChange={e => setNewCard({...newCard, hp: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="เช่น 120" />
                            </div>
                            <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">ราคา (บาท)</label>
                            <input required type="number" value={newCard.price} onChange={e => setNewCard({...newCard, price: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="เช่น 500" />
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">ธาตุ/ประเภท (Type)</label>
                            <select value={newCard.type} onChange={e => setNewCard({...newCard, type: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                                {Object.keys(typeColors).map(type => (
                                <option key={type} value={type}>{type}</option>
                                ))}
                            </select>
                            </div>
                            <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">ความหายาก (Rarity)</label>
                            <select value={newCard.rarity} onChange={e => setNewCard({...newCard, rarity: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                                <option value="-">- (ไม่มีดาว / ไอเทม)</option>
                                <option value="♦">♦ (ข้าวหลามตัด 1)</option>
                                <option value="♦♦">♦♦ (ข้าวหลามตัด 2)</option>
                                <option value="♦♦♦">♦♦♦ (ข้าวหลามตัด 3)</option>
                                <option value="♦♦♦♦">♦♦♦♦ (ข้าวหลามตัด 4)</option>
                                <option value="⭐">⭐ (ดาวทอง 1)</option>
                                <option value="⭐⭐">⭐⭐ (ดาวทอง 2 / เทรนเนอร์พิเศษ)</option>
                                <option value="🌟">🌟 (ดาวรุ้ง 1)</option>
                                <option value="🌟🌟">🌟🌟 (ดาวรุ้ง 2)</option>
                            </select>
                            </div>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">ลิงก์รูปภาพ (Image URL - ไม่ใส่ก็ได้)</label>
                            <input type="url" value={newCard.image} onChange={e => setNewCard({...newCard, image: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="https://..." />
                            <p className="text-xs text-slate-400 mt-1">หากไม่ใส่ ระบบจะสร้างสีพื้นหลังตามธาตุให้แทน</p>
                        </div>

                        <div className="pt-2">
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
                            บันทึกการ์ด
                            </button>
                        </div>
                        </form>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        // Render ลงหน้าเว็บ
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
